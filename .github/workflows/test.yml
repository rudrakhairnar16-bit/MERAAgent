name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: Track_3
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Verify imports
        working-directory: Track_3
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Working directory ==="
          pwd
          echo "=== Track_3 contents ==="
          ls -la
          echo "=== mirror_agent exists? ==="
          test -d mirror_agent && echo "YES" || echo "NO"
          echo "=== import mirror_agent.detector ==="
          python -c "import sys; sys.path.insert(0, '.'); from mirror_agent.detector import AdaptiveDetector, MetricWindow; print('OK')"
          echo "=== import mirror_agent.healer ==="
          python -c "import sys; sys.path.insert(0, '.'); from mirror_agent.healer import ActionExecutor; print('OK')"
          echo "=== import state ==="
          python -c "import sys; sys.path.insert(0, '.'); from state import get_state, append_cycle, save_state; print('OK')"
          echo "=== All imports passed ==="

      - name: Run non-LLM tests
        working-directory: Track_3
        run: |
          mkdir -p data
          python -m pytest -v -m "not llm" --cov=. --cov-report=term-missing --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: Track_3/test-results.xml
